candidate_id: ssrn_commodity_adaptive_tsmom_branch_001
status: candidate_ready
created_utc: 2026-05-20T03:59:00Z
owner: cyberhooman

source_papers:
  - doi: 10.2139/ssrn.1968996
    title: Momentum Strategies in Futures Markets and Trend-following Funds
    year: 2012
    relevance_note: Core evidence trail for futures momentum and trend-following.
  - doi: 10.2139/ssrn.2772047
    title: "Adaptive Time Series Momentum: An Objective Benchmark for Systematic Trend-Following Strategies"
    year: 2016
    relevance_note: Motivates adaptive time-series momentum benchmark construction.
  - doi: 10.2139/ssrn.2126813
    title: Trend Following, Risk Parity and Momentum in Commodity Futures
    year: 2012
    relevance_note: Supports risk parity/volatility-targeted futures trend branch.
  - doi: 10.2139/ssrn.4726027
    title: Factor Momentum in Commodity Futures Markets
    year: 2024
    relevance_note: Supports commodity factor/momentum branch as independent from NSP.

strategy_family: trend_following
target_system: new_independent_family
instrument_scope:
  - XAUUSD
  - MGC
  - NQ
  - CL
  - 6A
  - 6J

timeframe_scope:
  - 30m
  - daily_context_with_intraday_execution

hypothesis: >
  An independent adaptive time-series momentum branch with volatility-targeted
  sizing and prop-rule risk blocks can diversify the current NSP XAU package and
  improve combined rolling prop-firm pass robustness.

features:
  - name: adaptive_momentum_lookback
    definition: Select or ensemble lookbacks using only prior rolling performance/volatility state.
    lookahead_rule: Lookback choice must be determined before trade entry using past data only.
  - name: volatility_target_weight
    definition: Position/risk scaling from prior realized volatility with prop max-loss caps.
    lookahead_rule: Use prior closed bars only.
  - name: cross_asset_momentum_state
    definition: Momentum direction across permitted futures/CFD instruments.
    lookahead_rule: Use synchronized known bars; no future cross-market data.
  - name: prop_rule_risk_block
    definition: Daily loss/profit/consistency blocker before opening new trades.
    lookahead_rule: Use realized PnL known at decision time.

entry_logic_change: new_independent_strategy_branch
filter_logic:
  allow_trade_when:
    - adaptive momentum state exceeds threshold
    - volatility target risk is within prop constraints
    - daily/consistency blockers are inactive
  block_trade_when:
    - volatility spike makes position size too small or risk too large
    - cross-asset state conflicts with instrument signal

risk_model:
  account_model: Topstep 150K and CFD/FTMO variants depending on instrument set
  risk_per_trade: volatility_targeted_grid
  daily_loss_block: required
  cost_profile: futures_and_cfd_stress_cost_grid

data_required:
  - historical OHLC for allowed instruments
  - contract specs and costs
  - prop-firm rules per instrument/account

lookahead_risk:
  status: controllable
  notes: >
    Adaptive parameter selection can overfit. Use walk-forward selection and
    rolling validation only; never choose parameters from full-sample winners.

validation_required:
  - independent branch baseline
  - walk-forward parameter selection audit
  - stress cost grid
  - rolling prop-firm pass rate
  - combined portfolio test beside current XAU NSP
  - decision memo under strategy tester results folder

promotion_rule: >
  Promote only if it performs as an independent family and improves combined
  portfolio robustness, not merely because one asset/lookback fits history.

handoff:
  target_repo: prop-firm-research
  suggested_script: ssrn_adaptive_tsmom_independent_research.py
  expected_outputs:
    - orb_backtest/results/ssrn_adaptive_tsmom_summary.csv
    - orb_backtest/results/ssrn_adaptive_tsmom_decision.md
