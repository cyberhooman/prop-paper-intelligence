candidate_id: ssrn_gold_news_sentiment_overlay_xau_001
status: candidate_ready
created_utc: 2026-05-19T19:55:00Z
owner: cyberhooman

source_papers:
  - doi: 10.2139/ssrn.2309868
    title: News Sentiment in the Gold Futures Market
    year: 2013
    relevance_note: Directly relevant to gold futures/news sentiment and XAU macro sensitivity.
  - doi: 10.2139/ssrn.4870724
    title: News Sentiment and Commodity Futures Investing
    year: 2024
    relevance_note: Supports commodity-futures news sentiment overlays.
  - doi: 10.2139/ssrn.4755296
    title: Novel and Old News Sentiment in Commodity Futures Markets
    year: 2024
    relevance_note: Motivates separating novel news from stale/old news.

strategy_family: news_overlay
target_system: xauusd_oanda_nsp_30m
instrument_scope:
  - XAUUSD
  - MGC

timeframe_scope:
  - 30m
  - 5m

hypothesis: >
  A no-lookahead gold macro-news and sentiment overlay can block low-quality or
  prop-rule-dangerous XAU trades and improve rolling prop-firm pass robustness,
  especially around CPI, NFP, FOMC, PCE, unemployment, yields, and USD-related
  events.

features:
  - name: scheduled_event_class
    definition: Macro event category known before release, e.g. CPI, NFP, FOMC, PCE, unemployment, PMIs.
    lookahead_rule: Event schedule is known in advance; actual result/surprise can only be used after timestamp release.
  - name: pre_signal_news_sentiment
    definition: Directional gold/USD/rates sentiment from headlines published before signal confirmation.
    lookahead_rule: Use only timestamped headlines available before the signal candle is confirmed.
  - name: novelty_flag
    definition: Whether the headline/event is new information versus repeated/stale narrative.
    lookahead_rule: Novelty is computed only from prior known headline history.
  - name: forbidden_news_window
    definition: Prop/broker restricted-news window around specified events.
    lookahead_rule: Deterministic from rule calendar; no future outcome data.

entry_logic_change: none
filter_logic:
  allow_trade_when:
    - no forbidden-news rule is active
    - sentiment is aligned or neutral relative to trade direction
  block_trade_when:
    - forbidden_news_window is active
    - strong adverse pre-signal sentiment exists
    - event class has historically poor rolling stress results

risk_model:
  account_model: FTMO 2-Step Challenge Phase 1 100K and selected prop variants
  risk_per_trade: inherit_current_xau_oanda_candidate_or_grid
  daily_loss_block: inherit_current_xau_oanda_candidate_or_grid
  cost_profile: stress_cost_grid_with_news_spread_widening

data_required:
  - OANDA XAUUSD 30m OHLC history
  - timestamped macro calendar
  - timestamped gold/USD/rates headline or sentiment feed
  - prop/broker forbidden-news rule definitions

lookahead_risk:
  status: high
  notes: >
    News data is very easy to leak. Tester must enforce publication timestamps,
    release timestamps, and signal-confirmation timestamps. Actual event surprise
    cannot be used before release.

validation_required:
  - baseline current XAU OANDA NSP comparison
  - timestamp audit for every news/sentiment field
  - stress spread/slippage/commission including event widening
  - rolling prop-firm pass rate
  - broker/prop forbidden-news compliance memo
  - decision memo under strategy tester results folder

promotion_rule: >
  Promote only if the overlay improves compliance and rolling pass robustness
  without relying on leaked event outcomes or post-signal headlines.

handoff:
  target_repo: prop-firm-research
  suggested_script: xauusd_oanda_news_sentiment_overlay_research.py
  expected_outputs:
    - orb_backtest/results/xauusd_oanda_news_sentiment_overlay_summary.csv
    - orb_backtest/results/xauusd_oanda_news_sentiment_overlay_decision.md
