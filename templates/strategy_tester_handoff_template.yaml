candidate_id: example_candidate_id
handoff_version: 1
status: ready_for_strategy_tester
created_utc: YYYY-MM-DDTHH:MM:SSZ
research_repo: prop-paper-intelligence
strategy_tester_repo: prop-firm-research

summary:
  one_line: Short description of the candidate.
  objective: >
    What the tester should prove or disprove.
  expected_edge: >
    Why this might improve rolling prop-firm pass rate, drawdown, robustness,
    or compliance.

source_evidence:
  papers:
    - paper_id: paper_00
      doi: 10.2139/ssrn.example
      title: Example title
      role: primary | supporting | cautionary
      extracted_note: papers/extracted/example.md
  evidence_summary: >
    Short synthesis of what the papers imply. This is not a performance claim.

experiment:
  strategy_family: regime_filter | news_overlay | session_filter | trend_following | mean_reversion | other
  target_system: xauusd_oanda_nsp_30m | mgc_5m_vbr | new_independent_family | other
  instruments:
    - symbol: XAUUSD
      feed: OANDA
      asset_class: CFD
      timeframe: 30m
  prop_firm_presets:
    - FTMO 2-Step Challenge Phase 1 100K
  baseline_required: true
  baseline_reference:
    strategy_name: NSP XAUUSD CFD OANDA 30m Phase-1 Push
    decision_file: orb_backtest/results/xauusd_oanda_phase1_push_decision.md

feature_spec:
  features:
    - name: example_feature
      type: numeric | categorical | boolean | event
      definition: Exact calculation.
      lookback_bars: null
      timezone: UTC | broker_server | America/New_York | Europe/London | other
      known_at: before_signal | at_signal_close | after_event_release
      lookahead_rule: Exact rule preventing leakage.
      missing_data_policy: fail_closed | skip_trade | impute_from_prior | other

strategy_logic:
  entry_logic_change: none | new_independent_strategy_branch | describe_change
  filters:
    allow_trade_when:
      - condition
    block_trade_when:
      - condition
  exits:
    stop: inherit_baseline | describe
    target: inherit_baseline | describe
    cancel_rule: inherit_baseline | describe
    max_hold: inherit_baseline | describe
  position_sizing:
    mode: inherit_baseline | fixed_risk | volatility_target | grid
    risk_per_trade: inherit_baseline_or_value
    daily_loss_block: inherit_baseline_or_value
    daily_profit_block: optional

cost_and_stress:
  base_cost_profile: inherit_baseline
  stress_profiles:
    - stress_1p2pt_comm0
    - wider_spread_grid
  slippage_model: fixed_points | ticks | spread_multiple | custom
  commission_model: inherit_baseline | explicit

validation_plan:
  required_checks:
    - no_lookahead_timing_audit
    - baseline_comparison
    - stress_cost_grid
    - rolling_prop_firm_pass_rate
    - drawdown_and_failure_window_attribution
    - decision_memo
  target_metrics:
    minimum_rolling_pass_rate: 0.80
    prefer_current_baseline_or_better: true
    max_drawdown_buffer_required: true
    minimum_trade_count: tester_defined
  rejection_rules:
    - Any feature uses future bars or post-release event data before known timestamp.
    - Pass rate improves only by over-filtering to too few trades.
    - Stress costs break the target pass-rate/drawdown requirements.
    - Broker or prop rules make execution impossible.

expected_outputs:
  script: example_research_script.py
  summary_csv: orb_backtest/results/example_summary.csv
  trades_csv: orb_backtest/results/example_trades.csv
  decision_memo: orb_backtest/results/example_decision.md
  audit_artifacts:
    - no-lookahead timing audit
    - rolling window pass/fail file

promotion_rule: >
  Promote only if the decision memo shows the candidate passes the target
  rolling prop-firm validation with realistic costs and no lookahead.

notes_for_tester: >
  Any extra implementation notes, edge cases, or cautions.
