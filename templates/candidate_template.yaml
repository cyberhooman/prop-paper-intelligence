candidate_id: example_candidate_id
status: draft
created_utc: YYYY-MM-DDTHH:MM:SSZ
owner: cyberhooman

source_papers:
  - doi: 10.2139/ssrn.example
    title: Example Paper Title
    year: 2024
    relevance_note: Why this paper matters for the candidate.

strategy_family: regime_filter | news_overlay | session_filter | trend_following | mean_reversion | other
target_system: xauusd_oanda_nsp_30m | mgc_5m_vbr | new_independent_family | other
instrument_scope:
  - XAUUSD
  - MGC
  - NQ

timeframe_scope:
  - 30m
  - 5m

hypothesis: >
  Clear, falsifiable hypothesis. Example: realized semivariance and intraday
  momentum state can filter weak XAU NSP pullback trades and improve rolling
  prop-firm pass rate under stress costs.

features:
  - name: example_feature
    definition: How it is calculated.
    lookahead_rule: Must use only data known before signal confirmation.

entry_logic_change: none | describe_change
filter_logic:
  allow_trade_when:
    - condition_1
  block_trade_when:
    - condition_2

risk_model:
  account_model: FTMO 2-Step Challenge Phase 1 100K | Topstep 150K | other
  risk_per_trade: TBD
  daily_loss_block: TBD
  cost_profile: stress_cost_required

data_required:
  - OANDA XAUUSD 30m OHLC
  - session calendar
  - optional macro event calendar

lookahead_risk:
  status: controllable | high | unknown
  notes: Explain possible leakage and how tester must prevent it.

validation_required:
  - baseline current strategy comparison
  - no-lookahead timing audit
  - stress spread/slippage/commission
  - rolling prop-firm pass rate
  - decision memo under strategy tester results folder

promotion_rule: >
  Promote only if rolling pass rate improves or remains above target while
  reducing drawdown/failure windows under stress costs.

handoff:
  target_repo: prop-firm-research
  suggested_script: example_research_script.py
  expected_outputs:
    - orb_backtest/results/example_summary.csv
    - orb_backtest/results/example_decision.md
